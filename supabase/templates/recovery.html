<h2>Reset hasła</h2>
<p>Otrzymaliśmy prośbę o zresetowanie hasła do Twojego konta w ZagrodaHub.</p>
<p>Kliknij poniższy link, aby ustawić nowe hasło:</p>
<p>
  <a href="{{ .SiteURL }}/api/auth/confirm?token_hash={{ .TokenHash }}&type=recovery">
    Ustaw nowe hasło
  </a>
</p>
<p>Jeśli to nie Ty prosiłeś(-aś) o reset hasła, zignoruj tę wiadomość — Twoje hasło pozostanie bez zmian.</p>

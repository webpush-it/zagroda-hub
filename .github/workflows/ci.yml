name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx astro sync
      - run: npm run lint
      - run: npm run build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # storage-api must run: the S-01 migration creates the zagroda-photos
      # bucket + storage.objects policies. imgproxy stays excluded (no image
      # transformation — originals only).
      - run: npx supabase start -x studio,realtime,imgproxy,edge-runtime,mailpit
      - run: npm test

  deploy:
    needs: [ci, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Migrations land BEFORE the worker. Additive-only migration policy
      # (infrastructure.md "Rollback") keeps the old worker compatible in the window.
      - run: npx supabase link --project-ref viuusqzijkwykfoohulo
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      - run: npx supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      # Load the localities dictionary + backfill zagrody coordinates BEFORE the
      # worker ships (S-10). Without this the migration leaves `localities` empty
      # and existing published rows keep NULL coords, so the catalog's distance
      # sort has nothing to work with. Idempotent (upsert + set-based backfill).
      # Session pooler (IPv4-friendly for GitHub runners, port 5432); password
      # comes from the existing SUPABASE_DB_PASSWORD secret so no new secret is
      # needed. GitHub masks the secret in logs.
      - run: npm run db:seed-localities
        env:
          SUPABASE_DB_URL: postgresql://postgres.viuusqzijkwykfoohulo:${{ secrets.SUPABASE_DB_PASSWORD }}@aws-1-eu-central-2.pooler.supabase.com:5432/postgres
          # The match-rate gate catches normalization bugs when run by a human,
          # but ~12% of locality names are intentionally dropped as ambiguous
          # (they fall back to the voivodeship centroid), so a low rate is
          # expected and must NOT block deploys. Rate + misses are still logged.
          ALLOW_LOW_MATCH: "1"
      - run: npx astro sync
      - run: npm run build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      - run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
